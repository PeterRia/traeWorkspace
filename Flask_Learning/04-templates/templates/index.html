<!DOCTYPE html>
<html>
<head>
    <title>模板示例</title>
</head>
<body>
    <!-- 
    Jinja2模板语法示例：
    - {{ variable }} 用于输出变量的值
    - {% %} 用于执行逻辑（如循环、条件判断）
    -->
    
    <!-- 输出从Python传递过来的name变量 -->
    <h1>Hello, {{ name }}!</h1>
    
    <h2>水果列表:</h2>
    <ul>
        <!-- 使用for循环遍历items列表 -->
        {% for item in items %}
        <!-- 输出每个列表项 -->
        <li>{{ item }}</li>
        {% endfor %}
    </ul>
</body>
</html>
