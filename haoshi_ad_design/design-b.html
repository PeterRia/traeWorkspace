<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>豪士面包 - 方案B 户外广告实力风</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a1a;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 40px 20px;
  }

  /* ===== 海报主体 1920×1080 ===== */
  .poster {
    width: 960px;
    height: 540px;
    background: linear-gradient(135deg, #0D47A1 0%, #1565C0 25%, #1976D2 50%, #1E88E5 75%, #42A5F5 100%);
    position: relative;
    overflow: hidden;
    font-family: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }

  /* 科技感网格背景 */
  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 1;
  }

  /* 数据流动画效果 */
  .data-lines {
    position: absolute;
    inset: 0;
    z-index: 1;
    overflow: hidden;
  }
  .data-line {
    position: absolute;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(100,200,255,0.3), transparent);
    animation: flowLine 8s ease-in-out infinite;
  }
  .data-line:nth-child(1) { top: 20%; width: 60%; left: -10%; animation-delay: 0s; }
  .data-line:nth-child(2) { top: 40%; width: 40%; left: 20%; animation-delay: 2s; }
  .data-line:nth-child(3) { top: 60%; width: 50%; left: -5%; animation-delay: 4s; }
  .data-line:nth-child(4) { top: 80%; width: 45%; left: 15%; animation-delay: 6s; }
  .data-line:nth-child(5) { top: 30%; width: 35%; left: 30%; animation-delay: 1s; }

  @keyframes flowLine {
    0% { transform: translateX(-100%); opacity: 0; }
    20% { opacity: 1; }
    80% { opacity: 1; }
    100% { transform: translateX(200%); opacity: 0; }
  }

  /* 左侧工厂视觉区 */
  .factory-visual {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 55%;
    z-index: 2;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px;
  }

  /* 工厂建筑模拟 */
  .factory-scene {
    position: relative;
    width: 100%;
    height: 360px;
  }

  /* 工厂主体 */
  .factory-building {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 70%;
    height: 280px;
    background: linear-gradient(180deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.06) 100%);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 4px;
    backdrop-filter: blur(5px);
  }

  /* 工厂窗户 */
  .factory-windows {
    position: absolute;
    top: 20px;
    left: 15%;
    right: 15%;
    bottom: 60px;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 10px;
  }
  .window {
    background: linear-gradient(180deg, rgba(100,200,255,0.3), rgba(100,200,255,0.1));
    border: 1px solid rgba(100,200,255,0.2);
    border-radius: 2px;
    animation: windowGlow 3s ease-in-out infinite alternate;
  }
  .window:nth-child(odd) { animation-delay: 0.5s; }
  .window:nth-child(3n) { animation-delay: 1s; }

  @keyframes windowGlow {
    0% { background: rgba(100,200,255,0.15); }
    100% { background: rgba(100,200,255,0.35); }
  }

  /* 面包塔 */
  .bread-tower {
    position: absolute;
    right: 5%;
    bottom: 0;
    width: 60px;
    height: 200px;
  }
  .bread-layer {
    position: absolute;
    width: 100%;
    height: 25px;
    background: linear-gradient(90deg, rgba(245,222,179,0.4), rgba(245,222,179,0.6), rgba(245,222,179,0.4));
    border-radius: 3px;
    border: 1px solid rgba(245,222,179,0.3);
  }
  .bread-layer:nth-child(1) { bottom: 0; }
  .bread-layer:nth-child(2) { bottom: 28px; left: 5px; width: 90%; }
  .bread-layer:nth-child(3) { bottom: 56px; left: 10px; width: 80%; }
  .bread-layer:nth-child(4) { bottom: 84px; left: 15px; width: 70%; }
  .bread-layer:nth-child(5) { bottom: 112px; left: 18px; width: 65%; }
  .bread-layer:nth-child(6) { bottom: 140px; left: 20px; width: 60%; }
  .bread-layer:nth-child(7) { bottom: 168px; left: 22px; width: 55%; }
  .bread-layer:nth-child(8) { bottom: 196px; left: 24px; width: 50%; }

  /* 传送带 */
  .conveyor {
    position: absolute;
    bottom: 30px;
    left: 10%;
    right: 20%;
    height: 4px;
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
  }
  .conveyor::before {
    content: '';
    position: absolute;
    top: -8px;
    left: 0;
    right: 0;
    height: 16px;
    background: repeating-linear-gradient(90deg,
      rgba(245,222,179,0.5) 0px,
      rgba(245,222,179,0.5) 30px,
      transparent 30px,
      transparent 40px
    );
    animation: conveyorMove 2s linear infinite;
  }

  @keyframes conveyorMove {
    0% { transform: translateX(0); }
    100% { transform: translateX(40px); }
  }

  /* 机械手 */
  .robot-arm {
    position: absolute;
    top: 20px;
    left: 15%;
    width: 8px;
    height: 100px;
    background: linear-gradient(180deg, rgba(200,200,200,0.5), rgba(150,150,150,0.3));
    transform-origin: top center;
    animation: robotMove 4s ease-in-out infinite;
    border-radius: 4px;
  }
  .robot-arm::before {
    content: '';
    position: absolute;
    bottom: -15px;
    left: -8px;
    width: 24px;
    height: 15px;
    background: rgba(200,200,200,0.4);
    border-radius: 3px;
  }

  @keyframes robotMove {
    0%, 100% { transform: rotate(-5deg); }
    50% { transform: rotate(5deg); }
  }

  /* 顶部指标 */
  .metrics-bar {
    position: absolute;
    top: 20px;
    left: 40px;
    right: 40px;
    display: flex;
    justify-content: space-around;
    z-index: 3;
  }
  .metric-item {
    text-align: center;
    color: rgba(255,255,255,0.7);
  }
  .metric-value {
    font-size: 24px;
    font-weight: 900;
    color: #fff;
    letter-spacing: 1px;
  }
  .metric-label {
    font-size: 11px;
    letter-spacing: 2px;
    margin-top: 2px;
    color: rgba(255,255,255,0.5);
  }

  /* 右侧文字区 */
  .text-area {
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 45%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 50px 50px 50px 20px;
    z-index: 3;
  }

  /* 分割线 */
  .divider {
    width: 60px;
    height: 3px;
    background: linear-gradient(90deg, rgba(255,255,255,0.8), rgba(255,255,255,0.2));
    margin-bottom: 24px;
  }

  /* 主标题 */
  .main-headline {
    font-family: 'Noto Serif SC', 'Songti SC', serif;
    font-size: 42px;
    font-weight: 900;
    color: #fff;
    line-height: 1.3;
    letter-spacing: 3px;
    margin-bottom: 16px;
  }
  .main-headline .line2 {
    display: block;
    font-size: 36px;
    margin-top: 8px;
  }

  /* 副标题 */
  .sub-headline {
    font-size: 16px;
    color: rgba(255,255,255,0.7);
    letter-spacing: 4px;
    line-height: 1.8;
    margin-bottom: 32px;
    font-weight: 300;
  }

  /* 认证标识区 */
  .cert-badges {
    display: flex;
    gap: 16px;
    margin-bottom: 32px;
  }
  .cert-badge {
    padding: 10px 20px;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 4px;
    color: rgba(255,255,255,0.8);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
  }

  /* 底部品牌 */
  .footer-brand {
    display: flex;
    align-items: center;
    gap: 12px;
    color: rgba(255,255,255,0.6);
  }
  .footer-logo {
    width: 32px;
    height: 32px;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 14px;
    font-weight: 900;
  }
  .footer-name {
    font-size: 14px;
    letter-spacing: 6px;
    font-weight: 500;
  }
  .footer-slogan {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
    margin-top: 2px;
  }

  /* 右侧装饰圆 */
  .deco-circle {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.08);
    z-index: 1;
  }
  .deco-circle.c1 {
    width: 300px;
    height: 300px;
    right: -100px;
    top: -50px;
  }
  .deco-circle.c2 {
    width: 200px;
    height: 200px;
    right: -50px;
    bottom: -50px;
  }

  /* 底部渐变 */
  .bottom-gradient {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 120px;
    background: linear-gradient(to top, rgba(13,71,161,0.5), transparent);
    z-index: 2;
  }

</style>
</head>
<body>

<div class="poster">
  <!-- 背景层 -->
  <div class="grid-bg"></div>
  <div class="data-lines">
    <div class="data-line"></div>
    <div class="data-line"></div>
    <div class="data-line"></div>
    <div class="data-line"></div>
    <div class="data-line"></div>
  </div>
  <div class="deco-circle c1"></div>
  <div class="deco-circle c2"></div>

  <!-- 工厂视觉区 -->
  <div class="factory-visual">
    <div class="factory-scene">
      <div class="factory-building">
        <div class="factory-windows">
          <div class="window"></div><div class="window"></div><div class="window"></div>
          <div class="window"></div><div class="window"></div><div class="window"></div>
          <div class="window"></div><div class="window"></div><div class="window"></div>
          <div class="window"></div><div class="window"></div><div class="window"></div>
          <div class="window"></div><div class="window"></div><div class="window"></div>
          <div class="window"></div><div class="window"></div><div class="window"></div>
        </div>
      </div>

      <!-- 面包塔 -->
      <div class="bread-tower">
        <div class="bread-layer"></div>
        <div class="bread-layer"></div>
        <div class="bread-layer"></div>
        <div class="bread-layer"></div>
        <div class="bread-layer"></div>
        <div class="bread-layer"></div>
        <div class="bread-layer"></div>
        <div class="bread-layer"></div>
      </div>

      <!-- 传送带 -->
      <div class="conveyor"></div>

      <!-- 机械手 -->
      <div class="robot-arm"></div>
    </div>
  </div>

  <!-- 顶部指标 -->
  <div class="metrics-bar">
    <div class="metric-item">
      <div class="metric-value">24H</div>
      <div class="metric-label">全天候生产</div>
    </div>
    <div class="metric-item">
      <div class="metric-value">10万级</div>
      <div class="metric-label">洁净车间</div>
    </div>
    <div class="metric-item">
      <div class="metric-value">100+</div>
      <div class="metric-label">自动化设备</div>
    </div>
  </div>

  <!-- 文字信息区 -->
  <div class="text-area">
    <div class="divider"></div>

    <div class="main-headline">
      看得见的放心
      <span class="line2">品得到的美味</span>
    </div>

    <div class="sub-headline">
      豪士面包 · 现代化智能工厂<br>
      全程品质守护 从原料到成品
    </div>

    <div class="cert-badges">
      <div class="cert-badge">HACCP</div>
      <div class="cert-badge">ISO 22000</div>
      <div class="cert-badge">SC认证</div>
    </div>

    <div class="footer-brand">
      <div class="footer-logo">豪</div>
      <div>
        <div class="footer-name">豪士</div>
        <div class="footer-slogan">好面包 豪士造</div>
      </div>
    </div>
  </div>

  <!-- 底部渐变 -->
  <div class="bottom-gradient"></div>
</div>

</body>
</html>
