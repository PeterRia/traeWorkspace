<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>豪士面包 - 平面广告设计成品</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    font-family: 'Noto Sans SC', sans-serif;
    padding: 40px 20px;
    color: #333;
  }
  .page-header {
    text-align: center;
    margin-bottom: 60px;
    color: #fff;
  }
  .page-header h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: 42px;
    font-weight: 900;
    letter-spacing: 8px;
    margin-bottom: 12px;
    background: linear-gradient(135deg, #D4A574, #F5E6D3, #D4A574);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .page-header p {
    font-size: 16px;
    color: #888;
    letter-spacing: 4px;
  }
  .designs-container {
    max-width: 1400px;
    margin: 0 auto;
  }
  .design-section {
    margin-bottom: 80px;
  }
  .design-label {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
  }
  .design-label .tag {
    background: #D4A574;
    color: #fff;
    padding: 6px 16px;
    font-size: 13px;
    letter-spacing: 2px;
    font-weight: 700;
  }
  .design-label .title {
    color: #ccc;
    font-size: 14px;
    letter-spacing: 2px;
  }
  .design-wrapper {
    display: flex;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
  }
</style>
</head>
<body>

<div class="page-header">
  <h1>豪士面包 平面广告设计</h1>
  <p>第18届大广赛 · 平面类参赛作品</p>
</div>

<div class="designs-container">

  <!-- ==================== 方案A ==================== -->
  <div class="design-section">
    <div class="design-label">
      <span class="tag">方案A</span>
      <span class="title">社交媒体健康风 · 竖版 1080×1920</span>
    </div>
    <div class="design-wrapper">
      <div id="design-a"></div>
    </div>
  </div>

  <!-- ==================== 方案B ==================== -->
  <div class="design-section">
    <div class="design-label">
      <span class="tag">方案B</span>
      <span class="title">户外广告实力风 · 横版 1920×1080</span>
    </div>
    <div class="design-wrapper">
      <div id="design-b"></div>
    </div>
  </div>

  <!-- ==================== 方案C ==================== -->
  <div class="design-section">
    <div class="design-label">
      <span class="tag">方案C</span>
      <span class="title">生活场景温馨风 · 竖版 1080×1350</span>
    </div>
    <div class="design-wrapper">
      <div id="design-c"></div>
    </div>
  </div>

</div>

</body>
</html>
